<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zalo Bot Forward</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>🤖 Zalo Bot Forward</h1>
            <p class="subtitle">Tự động forward tin nhắn giữa các nhóm</p>
        </div>

        <div class="config-section">
            <div class="form-group">
                <label for="sourceGroups">Nhóm nguồn (mỗi dòng 1 nhóm):</label>
                <textarea id="sourceGroups" rows="4" placeholder="Nhóm A&#10;Nhóm B&#10;Nhóm C">Nhóm 1</textarea>
            </div>

            <div class="form-group">
                <label for="targetGroup">Nhóm đích (gửi tin nhắn):</label>
                <input type="text" id="targetGroup" placeholder="Nhập tên nhóm đích" value="Nhóm 2">
            </div>

            <div class="form-group">
                <label for="checkInterval">Thời gian chờ load tin nhắn mỗi nhóm (ms):</label>
                <input type="number" id="checkInterval" value="3000" min="1000" step="500">
            </div>

            <div class="form-group">
                <label for="forwardInterval">Chu kỳ forward (ms) - mặc định 30 giây:</label>
                <input type="number" id="forwardInterval" value="30000" min="10000" step="5000">
            </div>

            <div class="form-group">
                <label for="chromePath">Đường dẫn Chrome (để trống nếu dùng mặc định):</label>
                <input type="text" id="chromePath" placeholder="C:\Program Files\Google\Chrome\Application\chrome.exe">
            </div>

            <div class="button-group">
                <button id="startBtn" class="btn btn-start">▶ Bắt đầu</button>
                <button id="stopBtn" class="btn btn-stop" disabled>⏹ Dừng lại</button>
            </div>
        </div>

        <div class="session-section">
            <div class="form-group">
                <label>Quản lý phiên đăng nhập:</label>
                <button id="clearSessionBtn" class="btn btn-warning">🗑️ Xóa session & Login mới</button>
                <p class="helper-text">Xóa session hiện tại để đăng nhập tài khoản Zalo khác</p>
            </div>
        </div>

        <div class="status-section">
            <div class="status-header">
                <h3>Trạng thái</h3>
                <span id="statusIndicator" class="status-indicator idle">⚪ Chưa chạy</span>
            </div>
            <div id="statusText" class="status-text">
                Nhập thông tin và nhấn "Bắt đầu" để chạy bot
            </div>
        </div>

        <div class="log-section">
            <div class="log-header">
                <h3>Nhật ký hoạt động</h3>
                <button id="clearLogBtn" class="btn-clear">🗑️ Xóa log</button>
            </div>
            <div id="logContainer" class="log-container">
                <div class="log-entry">Chờ khởi động...</div>
            </div>
        </div>
    </div>

    <script src="renderer.js"></script>
</body>

</html>
